services:
  - type: web
    name: wok-chat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FORCE_HTTPS
        value: true
      - key: DB_ECHO
        value: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: MESSAGE_TTL_HOURS
        value: 48
      - key: CLEANUP_INTERVAL_SECONDS
        value: 300
      - key: LOGIN_MAX_ATTEMPTS
        value: 5
      - key: LOGIN_WINDOW_SECONDS
        value: 900
      - key: UPLOAD_DIR
        value: uploads
      - key: DATABASE_URL
        fromDatabase:
          name: wok-chat-db
          property: connectionString

databases:
  - name: wok-chat-db
    plan: free
